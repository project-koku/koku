# Auto-Bump Koku Image in cost-onprem-chart
#
# Triggers when a PR with the `flightpath-pr` label is merged to main.
# Creates a PR in insights-onprem/cost-onprem-chart that:
#   1. Updates the koku image tag in values.yaml to the merge commit SHA
#   2. Bumps the chart version via scripts/bump-version.sh --rc
#
# Uses a GitHub App for cross-repo authentication (not tied to any user).
#
# Prerequisites:
#   1. Create a GitHub App in the insights-onprem org with permissions:
#      Contents (Read & write), Pull requests (Read & write)
#   2. Install the app on the cost-onprem-chart repo
#   3. Generate a private key for the app
#   4. Add two repository secrets in project-koku/koku:
#      - COST_ONPREM_BOT_APP_ID: the app's numeric ID
#      - COST_ONPREM_BOT_PRIVATE_KEY: the .pem file contents
#   5. Ensure the `flightpath-pr` label exists in this repo

name: Bump cost-onprem-chart

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  bump-cost-chart:
    name: Bump koku image in cost-onprem-chart
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'flightpath-pr')

    steps:
      - name: Compute new image tag
        id: tag
        run: |
          NEW_TAG="${GITHUB_SHA::7}"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "New koku image tag: $NEW_TAG"

      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.COST_ONPREM_BOT_APP_ID }}
          private_key: ${{ secrets.COST_ONPREM_BOT_PRIVATE_KEY }}
          repository: insights-onprem/cost-onprem-chart

      - name: Checkout cost-onprem-chart
        uses: actions/checkout@v4
        with:
          repository: insights-onprem/cost-onprem-chart
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Create branch and update files
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="auto/bump-koku-${NEW_TAG}"
          git checkout -b "$BRANCH"

          # Update koku image tag in values.yaml (only the line after the koku repository)
          sed -i '/repository:.*cost-mgmt-dev-tenant\/koku/{n; s/tag: "[a-f0-9]*"/tag: "'"${NEW_TAG}"'"/}' cost-onprem/values.yaml

          # Bump chart version
          ./scripts/bump-version.sh --rc

          # Read new chart version for the PR body
          NEW_VERSION=$(grep '^version:' cost-onprem/Chart.yaml | awk '{print $2}')
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

          git add cost-onprem/values.yaml cost-onprem/Chart.yaml
          git commit -m "Bump koku image to ${NEW_TAG}"
          git push --force origin "$BRANCH"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          KOKU_PR_URL: ${{ github.event.pull_request.html_url }}
          KOKU_COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          read -r -d '' PR_BODY <<EOF || true
          ## Koku Image Bump

          | | Value |
          |---|---|
          | **New tag** | \`${NEW_TAG}\` |
          | **Chart version** | \`${NEW_VERSION}\` |

          ### Source

          - **Koku PR:** ${KOKU_PR_URL}
          - **Koku commit:** https://github.com/project-koku/koku/commit/${KOKU_COMMIT_SHA}

          ---
          *Automatically generated by [bump-cost-chart](${WORKFLOW_URL}) workflow.*
          EOF

          gh pr create \
            --repo insights-onprem/cost-onprem-chart \
            --base main \
            --head "auto/bump-koku-${NEW_TAG}" \
            --title "Bump koku image to ${NEW_TAG}" \
            --body "$PR_BODY"
