name: CI Triager

on:
  # Catches GitHub Actions CI failures (Sanity, Units, Coverage).
  # workflow_run fires once when the entire CI workflow completes — no debounce needed.
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Catches external check failures (Konflux koku-ci, koku-pr, Codecov, Snyk...).
  # GitHub Actions check runs do NOT trigger this event (GitHub limitation),
  # so there is no overlap with workflow_run above.
  check_run:
    types: [completed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to triage"
        required: true
      check_name:
        description: "Failing check name (for context)"
        required: false
        default: "manual trigger"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-triager-pr-${{ github.event.check_run.pull_requests[0].number || github.event.workflow_run.pull_requests[0].number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  triage:
    name: CI Triager
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.event == 'pull_request') ||
      (github.event_name == 'check_run' &&
       github.event.check_run.conclusion == 'failure' &&
       toJSON(github.event.check_run.pull_requests) != '[]')

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Resolve event context
        id: ctx
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
            CHECK_NAME="${{ github.event.inputs.check_name }}"
            HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --repo project-koku/koku --json headRefName --jq '.headRefName')

          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
            CHECK_NAME="CI (GitHub Actions)"
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"

          else
            PR_NUMBER="${{ github.event.check_run.pull_requests[0].number }}"
            CHECK_NAME="${{ github.event.check_run.name }}"
            HEAD_BRANCH="${{ github.event.check_run.pull_requests[0].head.ref }}"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "check_name=$CHECK_NAME" >> "$GITHUB_OUTPUT"
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      # Debounce only for check_run: Konflux koku-ci and koku-pr can fail
      # within seconds of each other. workflow_run already fires once per CI run.
      - name: Debounce — absorb rapid simultaneous failures
        if: github.event_name == 'check_run'
        run: sleep 300

      - name: Create and prompt CI Triager session
        env:
          AMBIENT_API_TOKEN: ${{ secrets.AMBIENT_API_TOKEN }}
          AC_API: "https://public-api-route-ambient-code.apps.rosa.vteam-uat.0ksl.p3.openshiftapps.com"
        run: |
          PROMPT="You are being triggered for a specific failing CI check.
          Skip Step 1 (scanning all open PRs) — investigate only:

          - PR: #${{ steps.ctx.outputs.pr_number }}
          - Failing check: ${{ steps.ctx.outputs.check_name }}
          - Head branch: ${{ steps.ctx.outputs.head_branch }}

          The full triager instructions are in
          \`docs/team_workflows/ci-triager/prompt.md\` in the cloned
          repository. Read that file first, then start from Step 1b
          (Bootstrap Konflux access) and proceed directly to Step 2
          for the PR and check listed above."

          # Step 1: create session (task field is intentionally minimal — the real
          # prompt is injected as a user message in Step 2, working around the
          # Public API Gateway bug where initialPrompt is not forwarded to the backend).
          CREATE_PAYLOAD=$(jq -n \
            --arg task "CI Triager session for PR #${{ steps.ctx.outputs.pr_number }}" \
            --arg display "CI Triager — PR #${{ steps.ctx.outputs.pr_number }} / ${{ steps.ctx.outputs.check_name }}" \
            --arg branch "${{ steps.ctx.outputs.head_branch }}" \
            '{
              task: $task,
              displayName: $display,
              repos: [{"url": "https://github.com/project-koku/koku", "branch": $branch, "autoPush": false}]
            }')

          echo "Creating session..."
          CREATE_RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${AMBIENT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-Ambient-Project: koku-ci" \
            -d "$CREATE_PAYLOAD" \
            "${AC_API}/v1/sessions")

          echo "Session created: $CREATE_RESPONSE"
          SESSION_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id // empty')

          if [ -z "$SESSION_ID" ]; then
            echo "ERROR: could not extract session ID from response"
            exit 1
          fi

          echo "Session ID: $SESSION_ID"

          # Step 2: send the full prompt as the first user message, bypassing the
          # initialPrompt bug in the Public API Gateway.
          MESSAGE_PAYLOAD=$(jq -n --arg payload "$PROMPT" '{event_type: "user", payload: $payload}')

          echo "Sending prompt to session..."
          MSG_RESPONSE=$(curl -sf \
            -X POST \
            -H "Authorization: Bearer ${AMBIENT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-Ambient-Project: koku-ci" \
            -d "$MESSAGE_PAYLOAD" \
            "${AC_API}/api/ambient/v1/sessions/${SESSION_ID}/messages")

          echo "Message sent: $MSG_RESPONSE"
